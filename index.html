<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-app</title>
    <!-- Anti-flicker: set data-mode before React hydrates so no FOUC on stored mode -->
    <script>
      (function () {
        try {
          var m = localStorage.getItem("portfolio-mode");
          document.documentElement.setAttribute(
            "data-mode",
            m === "machine" ? "machine" : "human"
          );
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
